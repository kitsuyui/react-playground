name: test
on:
  # pull-request events are not triggered when a PR is merged
  # push events are not triggered when a PR created from a fork repository
  # So we need both to run tests on every PR and after merging
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  test:
    runs-on: ubuntu-latest

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build must be run before linting and testing because some packages depends on the build output of other packages
      - name: Build
        run: bun run build

      - name: Measure build size
        if: matrix.node-version == '24.x'
        uses: kitsuyui/gh-build-size@v0.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: Check module isolation
        run: bun run check-module-isolation

      - name: Test
        run: bun run test

      - name: Try to build docs
        run: bun run typedoc

      - name: Check package exports
        run: bun run validate

      - name: Test packaging
        run: |
          set -eu
          for dir in packages/*; do
            if grep -q '"private": true' "$dir/package.json"; then
              continue
            fi
            (cd "$dir" && bun pm pack --dry-run >/dev/null)
          done
