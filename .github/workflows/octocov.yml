name: octocov
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  octocov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build before tests because some packages depend on build output.
      - name: Build
        run: bun run build

      - name: Test unit suite with coverage
        run: bun run test:coverage:unit

      - name: Test browser suite with coverage
        run: bun run test:coverage:browser:docker

      # See also: https://github.com/k1LoW/octocov-action
      - name: Report coverage with octocov
        uses: k1LoW/octocov-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .octocov.yml
